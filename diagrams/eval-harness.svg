<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 310" role="img">
  <title>Evaluation Harness Overview</title>
  <desc>Architecture diagram showing the evaluation harness: 30 labeled cases from eval_set.json feed into three parallel evaluation components (accuracy metrics, cost tracking, and parameter sweep), which all converge into a final eval_report.json output with metrics, costs, and recommendations.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E0E0E"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1E1E"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="amberBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFBF3B"/>
      <stop offset="100%" stop-color="#E5A530"/>
    </linearGradient>
    <linearGradient id="blueBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2D5A94"/>
      <stop offset="100%" stop-color="#1E3F6B"/>
    </linearGradient>
    <linearGradient id="greenBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8DC63F"/>
      <stop offset="100%" stop-color="#6FA832"/>
    </linearGradient>
    <linearGradient id="underlineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFBF3B"/>
      <stop offset="100%" stop-color="#E5A530"/>
    </linearGradient>
    <linearGradient id="arrowGradV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFBF3B"/>
      <stop offset="100%" stop-color="#2D5A94"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FFBF3B"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2D5A94"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8DC63F"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="310" fill="url(#bgGrad)" rx="6"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="18" font-weight="bold" fill="#FAFAFA">Evaluation Harness Overview</text>
  <rect x="340" y="37" width="220" height="3" rx="1.5" fill="url(#underlineGrad)"/>

  <!-- Top: eval_set.json (amber accent, centered) -->
  <g filter="url(#shadow)">
    <rect x="350" y="55" width="200" height="50" rx="5" fill="url(#boxGrad)" stroke="#333" stroke-width="1"/>
    <rect x="350" y="55" width="4" height="50" rx="2" fill="url(#amberBar)"/>
  </g>
  <text x="450" y="77" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="12" font-weight="bold" fill="#FFBF3B">eval_set.json</text>
  <text x="450" y="95" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">30 labeled cases</text>

  <!-- Three fan-out arrows from eval_set to columns -->
  <!-- Left arrow -->
  <path d="M 400 108 L 210 145" fill="none" stroke="#2D5A94" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <!-- Center arrow -->
  <line x1="450" y1="108" x2="450" y2="145" stroke="#2D5A94" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <!-- Right arrow -->
  <path d="M 500 108 L 690 145" fill="none" stroke="#2D5A94" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Column 1: Accuracy Metrics -->
  <g filter="url(#shadow)">
    <rect x="115" y="150" width="190" height="55" rx="5" fill="url(#boxGrad)" stroke="#333" stroke-width="1"/>
    <rect x="115" y="150" width="4" height="55" rx="2" fill="url(#blueBar)"/>
  </g>
  <text x="210" y="174" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#2D5A94">Accuracy Metrics</text>
  <text x="210" y="194" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">precision, recall per category</text>

  <!-- Column 2: Cost Tracking -->
  <g filter="url(#shadow)">
    <rect x="355" y="150" width="190" height="55" rx="5" fill="url(#boxGrad)" stroke="#333" stroke-width="1"/>
    <rect x="355" y="150" width="4" height="55" rx="2" fill="url(#blueBar)"/>
  </g>
  <text x="450" y="174" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#2D5A94">Cost Tracking</text>
  <text x="450" y="194" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">tokens, $/request</text>

  <!-- Column 3: Parameter Sweep -->
  <g filter="url(#shadow)">
    <rect x="595" y="150" width="190" height="55" rx="5" fill="url(#boxGrad)" stroke="#333" stroke-width="1"/>
    <rect x="595" y="150" width="4" height="55" rx="2" fill="url(#blueBar)"/>
  </g>
  <text x="690" y="174" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#2D5A94">Parameter Sweep</text>
  <text x="690" y="194" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">temp x max_tokens grid</text>

  <!-- Three converging arrows to eval_report.json -->
  <!-- Left arrow -->
  <path d="M 210 208 L 400 233" fill="none" stroke="#8DC63F" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <!-- Center arrow -->
  <line x1="450" y1="208" x2="450" y2="233" stroke="#8DC63F" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <!-- Right arrow -->
  <path d="M 690 208 L 500 233" fill="none" stroke="#8DC63F" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Bottom: eval_report.json (green accent, centered) -->
  <g filter="url(#shadow)">
    <rect x="330" y="238" width="240" height="50" rx="5" fill="url(#boxGrad)" stroke="#333" stroke-width="1"/>
    <rect x="330" y="238" width="4" height="50" rx="2" fill="url(#greenBar)"/>
  </g>
  <text x="450" y="260" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="12" font-weight="bold" fill="#8DC63F">eval_report.json</text>
  <text x="450" y="278" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">Metrics + costs + recommendations</text>

  <!-- Tech901 badge -->
  <text x="880" y="293" text-anchor="end" font-family="Source Sans 3, Calibri, sans-serif" font-size="8" fill="#555">Tech901 AI-102</text>
</svg>
