name: Autograding
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
  AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
  AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
  STUDENT_CORPUS_SEED: ${{ github.actor }}

jobs:
  grade:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run student code
        run: python app/main.py
        continue-on-error: true

      - name: Clone autograder
        uses: actions/checkout@v4
        with:
          repository: Tech901/ai102-autograder-tests
          token: ${{ secrets.AUTOGRADER_PAT }}
          path: .autograder

      # --- 45 tests, 100 points ---
      - name: "test_canary_system_message_not_empty"
        id: test1
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "test_canary_system_message_not_empty"
          command: "python -m pytest .autograder/activity03-triage-engine/test_hidden.py::test_canary_system_message_not_empty -v --tb=short"
          timeout: "5"
          max-score: "3"

