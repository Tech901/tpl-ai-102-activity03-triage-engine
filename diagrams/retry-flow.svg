<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" role="img">
  <title>Retry with Correction Flow</title>
  <desc>A vertical decision-tree flow showing the retry pattern: an API call feeds into validation, which checks if the result is valid. On success, the result is returned. On failure, a correction prompt with error details is sent back to the API call, up to a maximum number of retries.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E0E0E"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1E1E"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="amberBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFBF3B"/>
      <stop offset="100%" stop-color="#E5A530"/>
    </linearGradient>
    <linearGradient id="blueBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2D5A94"/>
      <stop offset="100%" stop-color="#1E3F6B"/>
    </linearGradient>
    <linearGradient id="greenBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8DC63F"/>
      <stop offset="100%" stop-color="#6FA832"/>
    </linearGradient>
    <linearGradient id="underlineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFBF3B"/>
      <stop offset="100%" stop-color="#E5A530"/>
    </linearGradient>
    <linearGradient id="arrowGradV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D5A94"/>
      <stop offset="100%" stop-color="#1E3F6B"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2D5A94"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8DC63F"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FFBF3B"/>
    </marker>
    <marker id="arrowDash" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FFBF3B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="340" fill="url(#bgGrad)" rx="6"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="18" font-weight="bold" fill="#FAFAFA">Retry with Correction Flow</text>
  <rect x="355" y="37" width="190" height="3" rx="1.5" fill="url(#underlineGrad)"/>

  <!-- Row 1: API Call -->
  <g filter="url(#shadow)">
    <rect x="370" y="55" width="160" height="50" rx="5" fill="url(#boxGrad)" stroke="#333" stroke-width="1"/>
    <rect x="370" y="55" width="4" height="50" rx="2" fill="url(#blueBar)"/>
  </g>
  <text x="450" y="77" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#2D5A94">API Call</text>
  <text x="450" y="95" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">classify_request()</text>

  <!-- Arrow down to Validate -->
  <line x1="450" y1="108" x2="450" y2="132" stroke="#2D5A94" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Row 2: Validate -->
  <g filter="url(#shadow)">
    <rect x="370" y="138" width="160" height="50" rx="5" fill="url(#boxGrad)" stroke="#333" stroke-width="1"/>
    <rect x="370" y="138" width="4" height="50" rx="2" fill="url(#blueBar)"/>
  </g>
  <text x="450" y="160" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#2D5A94">Validate</text>
  <text x="450" y="178" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">validate_against_schema()</text>

  <!-- Arrow down to Diamond -->
  <line x1="450" y1="191" x2="450" y2="213" stroke="#FFBF3B" stroke-width="1.5" marker-end="url(#arrowAmber)"/>

  <!-- Row 3: Diamond (Valid?) -->
  <polygon points="450,218 490,243 450,268 410,243" fill="url(#boxGrad)" stroke="#FFBF3B" stroke-width="1.5"/>
  <text x="450" y="247" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#FFBF3B">Valid?</text>

  <!-- Right arrow to Return Result (yes) -->
  <line x1="493" y1="243" x2="593" y2="243" stroke="#8DC63F" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="540" y="236" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#8DC63F">yes</text>

  <!-- Return Result box -->
  <g filter="url(#shadow)">
    <rect x="600" y="218" width="155" height="50" rx="5" fill="url(#boxGrad)" stroke="#333" stroke-width="1"/>
    <rect x="600" y="218" width="4" height="50" rx="2" fill="url(#greenBar)"/>
  </g>
  <text x="677" y="240" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#8DC63F">Return Result</text>
  <text x="677" y="258" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">Success</text>

  <!-- Down arrow from diamond to Correction Prompt (no) -->
  <line x1="450" y1="271" x2="450" y2="280" stroke="#FFBF3B" stroke-width="1.5"/>
  <text x="465" y="280" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#FFBF3B">no</text>

  <!-- Correction Prompt box (below diamond, shifted left) -->
  <g filter="url(#shadow)">
    <rect x="145" y="270" width="175" height="50" rx="5" fill="url(#boxGrad)" stroke="#333" stroke-width="1"/>
    <rect x="145" y="270" width="4" height="50" rx="2" fill="url(#amberBar)"/>
  </g>
  <text x="232" y="292" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#FFBF3B">Correction Prompt</text>
  <text x="232" y="310" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">Include error details</text>

  <!-- Arrow from diamond down and left to Correction Prompt -->
  <path d="M 450 285 L 325 295" fill="none" stroke="#FFBF3B" stroke-width="1.5" marker-end="url(#arrowAmber)"/>

  <!-- Curved dashed retry arrow from Correction Prompt back up to API Call -->
  <path d="M 145 295 Q 100 295 100 175 Q 100 75 365 75" fill="none" stroke="#FFBF3B" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowDash)"/>
  <text x="68" y="180" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" font-style="italic" fill="#FFBF3B">retry</text>
  <text x="68" y="193" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" font-style="italic" fill="#FFBF3B">(max N)</text>

  <!-- Counter note -->
  <text x="135" y="265" text-anchor="end" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#999">max_retries = 3</text>

  <!-- Tech901 badge -->
  <text x="880" y="322" text-anchor="end" font-family="Source Sans 3, Calibri, sans-serif" font-size="8" fill="#555">Tech901 AI-102</text>
</svg>
